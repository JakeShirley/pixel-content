name: Deploy Pixel Wall Content Pages

on:
  push:
    branches:
      - main
    paths:
      - assets/processed/**
      - tools/PixelWallContent/**
      - tools/PixelWallAnimationConverter/**
      - CONTENT_SERVER_FORMAT.md
      - .github/workflows/deploy-content-pages.yml
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build content tree
        shell: pwsh
        env:
          PIXEL_WALL_CONTENT_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          PIXEL_WALL_CONTENT_SOURCE_REF: ${{ github.ref_name }}
        run: |
          Import-Module ./tools/PixelWallContent/PixelWallContent.psm1
          Publish-PixelWallAnimationContent -InputPath ./assets/processed -OutputPath ./_site -Clean -Recurse -PassThru |
            Format-Table Dimensions, Name, PublishedName, FrameCount, FramesPerSecond, SizeBytes

      - name: Deploy converter tool
        shell: pwsh
        run: |
          $converterSrc = './tools/PixelWallAnimationConverter'
          $converterDest = './_site/converter'
          if (Test-Path $converterDest) {
            Remove-Item -Recurse -Force $converterDest
          }
          Copy-Item -Path $converterSrc -Destination $converterDest -Recurse

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
          error_count: 30
          reporting_interval: 10000