name: Deploy Pixel Wall Content Pages

on:
  push:
    branches:
      - main
    paths:
      - assets/processed/**
      - src/**
      - tools/PixelWallAnimationConverter/**
      - astro.config.mjs
      - astro-integration.mjs
      - package.json
      - package-lock.json
      - tsconfig.json
      - CONTENT_SERVER_FORMAT.md
      - .github/workflows/deploy-content-pages.yml
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Astro project
        run: npm run check

      - name: Build site with Astro
        run: npm run build

      - name: Deploy converter tool
        shell: bash
        run: |
          CONVERTER_SRC='./tools/PixelWallAnimationConverter'
          CONVERTER_DEST='./_site/converter'
          if [ -d "$CONVERTER_DEST" ]; then
            rm -rf "$CONVERTER_DEST"
          fi
          cp -r "$CONVERTER_SRC" "$CONVERTER_DEST"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30
          reporting_interval: 10000
